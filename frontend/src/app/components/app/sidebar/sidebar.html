<section>
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon" style="width:28px;height:28px;font-size:13px">
                {{icon}}
            </div>
            {{title}}
        </div>
    </div>

    <div class="sidebar-section">
        <app-label title="Main"></app-label>
        <app-item icon="🏠" title="Dashboard" link="dashboards"></app-item>
        <app-item icon="💬" title=" AI Chat" badge="AI" link="chat"></app-item>
        <app-item icon="📁" title="History" link="documents"></app-item>

        <app-label title="Business"></app-label>
        <app-item icon="🔗" title="API" link="api" [isPro]="true"></app-item>

        <app-label title="Account"></app-label>
        <app-item icon="⚙️" title="Settings" link="settings"></app-item>
        <app-item icon="💳" title="Billing" link="billing"></app-item>
    </div>

    <div class="sidebar-bottom">
        <div class="user-pill">
            <div class="avatar" id="sidebar-avatar">AJ</div>
            <div class="user-info">
                <div class="user-name" id="sidebar-username">Alex Johnson</div>
                <div class="user-plan" id="sidebar-plan">Free Plan</div>
            </div>
            <div style="font-size:14px;color:var(--text3)">⚙</div>
        </div>
    </div>
</section>
