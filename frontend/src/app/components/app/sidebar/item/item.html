<section [routerLink]="link" routerLinkActive="active">
    <span class="sidebar-item-icon">{{icon}}</span>
    {{title}}
    <span class="sidebar-item-badge" *ngIf="badge">{{badge}}</span>
    <span class="tag tag-pro" style="margin-left:auto;padding:2px 6px;font-size:9px"
        *ngIf="isPro">PRO</span>
</section>
